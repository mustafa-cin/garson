# asci1-deployment.yaml - Mehmet Usta (Pizza, Pasta uzmanı)
#
# NEDEN her aşçı ayrı Deployment?
#   Her aşçının farklı environment variable'ları var (isim, uzmanlık, hız).
#   Bu yüzden her birini ayrı Deployment olarak tanımlıyoruz.
#   Docker-compose'daki asci1, asci2, asci3 servislerinin karşılığı.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: asci1-mehmet
  namespace: restoran
  labels:
    app: asci
    asci-isim: mehmet
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asci
      asci-isim: mehmet
  template:
    metadata:
      labels:
        app: asci
        asci-isim: mehmet
        role: worker
    spec:
      containers:
        - name: asci
          image: restoran/asci:latest
          imagePullPolicy: Never
          env:
            - name: GARSON_URL
              value: "http://garson:5000"      # Service DNS adı ile garson'a ulaşır
            - name: ASCI_ISIM
              value: "Mehmet Usta"
            - name: UZMANLIK
              value: "🍕 Pizza Margherita,🍝 Spagetti Carbonara"
            - name: POLLING_INTERVAL
              value: "5"
            - name: HAZIRLAMA_HIZI
              value: "0.8"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
