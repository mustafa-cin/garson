# asci3-deployment.yaml - Ali Usta (Genel aşçı)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: asci3-ali
  namespace: restoran
  labels:
    app: asci
    asci-isim: ali
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asci
      asci-isim: ali
  template:
    metadata:
      labels:
        app: asci
        asci-isim: ali
        role: worker
    spec:
      containers:
        - name: asci
          image: restoran/asci:latest
          imagePullPolicy: Never
          env:
            - name: GARSON_URL
              value: "http://garson:5000"
            - name: ASCI_ISIM
              value: "Ali Usta"
            - name: UZMANLIK
              value: ""
            - name: POLLING_INTERVAL
              value: "5"
            - name: HAZIRLAMA_HIZI
              value: "1.2"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
